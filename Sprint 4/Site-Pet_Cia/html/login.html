<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet & Cia | Login</title>

    <!-- Bootstrap CSS (CDN) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS próprio do projeto -->
    <link href="../assets/estilo.css" rel="stylesheet" />
  </head>
  <body>
    <div class="pc-login-page">
      <div class="pc-login-card">
        <div class="pc-login-logo">
          <img src="../images/logo_PetCia.png" alt="Logo Pet & Cia" />
        </div>

        <div class="pc-login-title">Acesse sua conta</div>
        <div class="pc-login-subtitle">Entre com seus dados para continuar</div>

        <form class="pc-login-form">
          <div class="mb-3">
            <label for="loginEmail">E-mail ou usuário</label>
            <input
              type="text"
              class="form-control"
              id="loginEmail"
              placeholder="seu@email.com"
            />
          </div>

          <div class="mb-2">
            <label for="loginSenha">Senha</label>
            <input
              type="password"
              class="form-control"
              id="loginSenha"
              placeholder="••••••••"
            />
          </div>

          <div class="pc-login-options">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="lembrarMe" />
              <label class="form-check-label" for="lembrarMe">
                Lembrar-me
              </label>
            </div>
            <a href="#">Esqueci minha senha</a>
          </div>

          <a
            href="index.html"
            class="btn btn-pc-primary pc-btn-lg-action w-100"
          >
            Entrar
          </a>
        </form>

        <div class="pc-login-signup">
          Não tem uma conta? <a href="#">Cadastre-se</a>
        </div>
      </div>
    </div>
  </body>
</html>
